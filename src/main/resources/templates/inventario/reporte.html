<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reporte de Inventario - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link active"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Reporte General</span>
    </div>
    <div class="page-content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-bar-chart-fill me-2 text-danger"></i>Consolidado de Inventario</span>
                <small class="text-muted d-none d-sm-inline">Informe de Movimientos y Stock</small>
            </div>
            <div class="card-body p-0">
                <div th:if="${reporte != null}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead>
                                <tr>
                                    <th class="ps-4">Producto</th>
                                    <th class="d-none d-md-table-cell">Categoría</th>
                                    <th>Stock</th>
                                    <th>Ingresos</th>
                                    <th>Salidas</th>
                                    <th class="d-none d-sm-table-cell">Lotes</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${reporte}">
                                    <td class="ps-4 fw-semibold" th:text="${item.nombreProducto}"></td>
                                    <td class="d-none d-md-table-cell" th:text="${item.categoria}"></td>
                                    <td>
                                        <span class="fw-bold" th:text="${item.stockActual}"></span>
                                    </td>
                                    <td>
                                        <span class="text-success small fw-semibold">
                                            <i class="bi bi-arrow-down-circle-fill"></i>
                                            <span th:text="${item.totalIngresos}"></span>
                                        </span>
                                    </td>
                                    <td>
                                        <span class="text-danger small fw-semibold">
                                            <i class="bi bi-arrow-up-circle-fill"></i>
                                            <span th:text="${item.totalSalidas}"></span>
                                        </span>
                                    </td>
                                    <td class="d-none d-sm-table-cell" th:text="${item.cantidadLotes}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${reporte == null}" class="text-center text-muted py-5">
                    <i class="bi bi-bar-chart d-block" style="font-size: 2rem;"></i>
                    No hay datos de reporte disponibles.
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

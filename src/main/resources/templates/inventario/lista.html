<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inventario - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .stock-bar { height: 8px; border-radius: 4px; background: #e2e8f0; }
        .stock-bar-fill { height: 8px; border-radius: 4px; transition: width 0.5s; }
    </style>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link active"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Consulta de Inventario</span>
    </div>
    <div class="page-content">
        <div class="card mb-3">
            <div class="card-body">
                <form method="get" th:action="@{/inventario}" class="row g-3 align-items-end">
                    <div class="col-12 col-md-6">
                        <label class="form-label fw-semibold small">Filtrar por Producto</label>
                        <select name="idProducto" class="form-select">
                            <option value="">-- Todos los productos --</option>
                            <option th:each="prod : ${productos}"
                                    th:value="${prod.idProducto}"
                                    th:text="${prod.nombre}"
                                    th:selected="${prod.idProducto == productoSeleccionado}">
                            </option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary d-flex align-items-center justify-content-center flex-grow-1">
                                <i class="bi bi-funnel-fill me-2"></i>Filtrar
                            </button>
                            <button type="button" onclick="exportToExcel()" class="btn btn-success d-flex align-items-center justify-content-center flex-grow-1">
                                <i class="bi bi-file-earmark-excel me-2"></i>Excel
                            </button>
                            <a th:href="@{/inventario}" class="btn btn-outline-secondary d-flex align-items-center justify-content-center px-3" title="Limpiar">
                                <i class="bi bi-arrow-clockwise"></i>
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center bg-white py-3">
                <span class="fw-bold"><i class="bi bi-clipboard-data-fill me-2 text-danger"></i>Stock Actual</span>
                <span class="badge bg-light text-dark border fw-normal small d-none d-sm-inline">Valorización Automática</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle" id="inventoryTable">
                        <thead>
                            <tr>
                                <th class="ps-3 ps-sm-4">Producto</th>
                                <th class="d-none d-lg-table-cell">Categoría</th>
                                <th class="d-none d-sm-table-cell">Precio</th>
                                <th class="d-none d-md-table-cell">Mín.</th>
                                <th>Stock</th>
                                <th>Total</th>
                                <th class="text-end pe-3 pe-sm-4">Est.</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="inv : ${inventarios}">
                                <td class="ps-3 ps-sm-4 fw-semibold text-truncate-cell" th:text="${inv.nombreProducto}" data-name th:title="${inv.nombreProducto}"></td>
                                <td class="d-none d-lg-table-cell" th:text="${inv.categoriaProducto}" data-cat></td>
                                <td class="d-none d-sm-table-cell" th:text="${inv.precioUnitario}" data-price></td>
                                <td class="d-none d-md-table-cell text-muted" th:text="${inv.stockMinimo}" data-min></td>
                                <td>
                                    <strong th:text="${inv.stockActual}" data-stock></strong>
                                </td>
                                <td class="fw-bold text-primary" 
                                    th:text="${'S/ ' + (inv.stockActual * inv.precioUnitario)}"></td>
                                <td class="text-end pe-3 pe-sm-4">
                                    <span th:if="${inv.stockActual == null or inv.stockActual == 0}" class="badge bg-dark" data-status="CRÍTICO">Sin</span>
                                    <span th:if="${inv.stockActual != null and inv.stockActual > 0 and inv.stockActual <= inv.stockMinimo}" class="badge bg-danger" data-status="REPOSICIÓN">Bajo</span>
                                    <span th:if="${inv.stockActual != null and inv.stockActual > inv.stockMinimo and inv.stockActual <= (inv.stockMinimo * 2)}" class="badge bg-warning text-dark" data-status="MEDIO">Med.</span>
                                    <span th:if="${inv.stockActual != null and inv.stockActual > (inv.stockMinimo * 2)}" class="badge bg-success-subtle text-success border border-success-subtle" data-status="ÓPTIMO">OK</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function exportToExcel() {
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Inventario Coca-Cola');

        // Estilos
        const headerStyle = {
            font: { bold: true, color: { argb: 'FFFFFF' } },
            fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'CC0000' } },
            alignment: { horizontal: 'center' }
        };

        // Columnas
        worksheet.columns = [
            { header: 'PRODUCTO', key: 'nombre', width: 30 },
            { header: 'CATEGORÍA', key: 'categoria', width: 20 },
            { header: 'PRECIO UNIT.', key: 'precio', width: 15 },
            { header: 'STOCK ACTUAL', key: 'stock', width: 15 },
            { header: 'VALORIZACIÓN', key: 'valor', width: 18 },
            { header: 'STATUS', key: 'estado', width: 15 }
        ];

        worksheet.getRow(1).eachCell((cell) => cell.style = headerStyle);

        // Datos
        const rows = document.querySelectorAll('#inventoryTable tbody tr');
        let totalValoration = 0;

        rows.forEach(tr => {
            const nombre = tr.querySelector('[data-name]').innerText;
            const categoria = tr.querySelector('[data-cat]').innerText;
            const precio = parseFloat(tr.querySelector('[data-price]').innerText) || 0;
            const stock = parseInt(tr.querySelector('[data-stock]').innerText) || 0;
            const valor = precio * stock;
            const estado = tr.querySelector('[data-status]').getAttribute('data-status');
            
            totalValoration += valor;

            const row = worksheet.addRow({
                nombre: nombre,
                categoria: categoria,
                precio: precio,
                stock: stock,
                valor: valor,
                estado: estado
            });

            // Formato moneda
            row.getCell('precio').numFmt = '"S/" #,##0.00';
            row.getCell('valor').numFmt = '"S/" #,##0.00';
        });

        // Fila de Total
        worksheet.addRow([]);
        const totalRow = worksheet.addRow({
            nombre: 'TOTAL VALORIZACIÓN INVENTARIO',
            valor: totalValoration
        });
        totalRow.getCell('nombre').font = { bold: true };
        totalRow.getCell('valor').font = { bold: true };
        totalRow.getCell('valor').numFmt = '"S/" #,##0.00';

        // Descargar
        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `Inventario_CocaCola_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

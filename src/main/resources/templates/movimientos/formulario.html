<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Movimientos - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 12px; max-width: 700px; margin: 0 auto; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(204,0,0,0.1); }
        label { font-weight: 500; font-size: 0.9rem; color: #374151; margin-bottom: 5px; }
        .tipo-btn { cursor: pointer; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; transition: all 0.2s; background: white; }
        .tipo-btn.ingreso:hover, .tipo-btn.ingreso.selected { border-color: #059669; background: #ecfdf5; color: #065f46; }
        .tipo-btn.salida:hover, .tipo-btn.salida.selected { border-color: #dc2626; background: #fef2f2; color: #991b1b; }
    </style>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link active"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Registrar Movimiento</span>
    </div>
    <div class="page-content">
        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <i class="bi bi-arrow-left-right me-2 text-danger"></i>
                <span class="fw-bold">Nueva Operación de Stock</span>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/movimientos/guardar}" method="post" id="formMovimiento">
                    <!-- Tipo de Movimiento -->
                    <div class="mb-4">
                        <label class="d-block mb-3">Seleccione el Tipo *</label>
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="tipo-btn ingreso text-center" onclick="selectTipo('INGRESO', this)">
                                    <i class="bi bi-arrow-down-circle-fill d-block mb-1" style="font-size: 1.5rem;"></i>
                                    <strong>INGRESO</strong>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="tipo-btn salida text-center" onclick="selectTipo('SALIDA', this)">
                                    <i class="bi bi-arrow-up-circle-fill d-block mb-1" style="font-size: 1.5rem;"></i>
                                    <strong>SALIDA</strong>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" id="tipoHidden" name="tipo" required/>
                        <div id="tipoError" class="text-danger small mt-2" style="display:none;">
                            <i class="bi bi-exclamation-circle me-1"></i>Debe elegir un tipo de movimiento.
                        </div>
                    </div>

                    <!-- Producto / Inventario -->
                    <div class="mb-3">
                        <label for="idInventario">Producto *</label>
                        <select id="idInventario" name="idInventario" class="form-select" required
                                onchange="cargarLotes(this.value)">
                            <option value="">-- Seleccione un producto --</option>
                            <option th:each="inv : ${inventarios}"
                                    th:value="${inv.idInventario}"
                                    th:text="${inv.nombreProducto + ' (Stock: ' + inv.stockActual + ')'}">
                            </option>
                        </select>
                    </div>

                    <!-- Lote -->
                    <div class="mb-3">
                        <label for="idLote">Lote *</label>
                        <select id="idLote" name="idLote" class="form-select" required>
                            <option value="">-- Seleccione el producto --</option>
                        </select>
                    </div>

                    <!-- Cantidad y Motivo -->
                    <div class="row g-3">
                        <div class="col-12 col-sm-4 mb-3">
                            <label for="cantidad">Cantidad *</label>
                            <input type="number" id="cantidad" name="cantidad" class="form-control"
                                   min="1" required placeholder="Cant."/>
                        </div>
                        <div class="col-12 col-sm-8 mb-3">
                            <label for="motivo">Motivo / Observación *</label>
                            <input type="text" id="motivo" name="motivo" class="form-control"
                                   placeholder="Ej: Reposición, Venta, Merma..."
                                   required maxlength="200"/>
                        </div>
                    </div>

                    <div class="d-grid d-sm-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4 rounded-pill" onclick="return validar()">
                            <i class="bi bi-save me-1"></i>Registrar
                        </button>
                        <a th:href="@{/movimientos}" class="btn btn-outline-secondary px-4 rounded-pill">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    function selectTipo(tipo, el) {
        document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('tipoHidden').value = tipo;
        document.getElementById('tipoError').style.display = 'none';
    }

    function cargarLotes(idInventario) {
        const select = document.getElementById('idLote');
        select.innerHTML = '<option value="">Cargando...</option>';
        if (!idInventario) {
            select.innerHTML = '<option value="">-- Seleccione primero el producto --</option>';
            return;
        }
        // Buscar idProducto del inventario seleccionado
        const opt = document.querySelector('#idInventario option[value="' + idInventario + '"]');
        // Llamar al endpoint para obtener lotes
        fetch('/movimientos/lotes-por-inventario/' + idInventario)
            .then(r => r.json())
            .then(lotes => {
                select.innerHTML = '<option value="">-- Seleccione un lote --</option>';
                if (lotes.length === 0) {
                    select.innerHTML += '<option value="" disabled>No hay lotes registrados</option>';
                }
                lotes.forEach(l => {
                    const numLote = l.numeroLote ? l.numeroLote : ('#' + l.idLote);
                    select.innerHTML += `<option value="${l.idLote}">Lote: ${numLote} - Vence: ${l.fechaVencimiento}</option>`;
                });
            })
            .catch(() => {
                select.innerHTML = '<option value="">Error al cargar lotes</option>';
            });
    }

    function validar() {
        if (!document.getElementById('tipoHidden').value) {
            document.getElementById('tipoError').style.display = 'block';
            return false;
        }
        return true;
    }
</script>
</body>
</html>

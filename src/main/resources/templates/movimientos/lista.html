<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Movimientos - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link active"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Historial de Movimientos</span>
    </div>
    <div class="page-content">
        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-arrow-left-right me-2 text-danger"></i>Movimientos Recientes</span>
                <a th:href="@{/movimientos/nuevo}" class="btn btn-primary btn-sm rounded-pill px-3">
                    <i class="bi bi-plus-circle me-1"></i>Nuevo
                </a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Tipo</th>
                                <th>Producto</th>
                                <th class="d-none d-lg-table-cell">Motivo</th>
                                <th>Cant.</th>
                                <th class="d-none d-sm-table-cell">Fecha</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="mov : ${movimientos}">
                                <td class="ps-4 text-muted" th:text="${mov.idMovimiento}"></td>
                                <td>
                                    <span th:if="${mov.tipo.name() == 'INGRESO'}"
                                          class="badge bg-success-subtle text-success border border-success-subtle">
                                        <i class="bi bi-arrow-down-circle me-1"></i>ENTRA
                                    </span>
                                    <span th:if="${mov.tipo.name() == 'SALIDA'}"
                                          class="badge bg-danger-subtle text-danger border border-danger-subtle">
                                        <i class="bi bi-arrow-up-circle me-1"></i>SALE
                                    </span>
                                </td>
                                <td class="fw-semibold" th:text="${mov.nombreProducto}"></td>
                                <td class="d-none d-lg-table-cell small text-muted" th:text="${mov.motivo}"></td>
                                <td th:text="${mov.cantidad}"></td>
                                <td class="d-none d-sm-table-cell" th:text="${mov.fecha}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(movimientos)}">
                                <td colspan="6" class="text-center text-muted py-5">
                                    <i class="bi bi-arrow-left-right d-block" style="font-size: 2rem;"></i>
                                    No hay movimientos registrados.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lotes - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 12px; max-width: 600px; margin: 0 auto; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(204,0,0,0.1); }
        label { font-weight: 500; font-size: 0.9rem; color: #374151; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link active"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Registrar Nuevo Lote</span>
    </div>
    <div class="page-content">
        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <i class="bi bi-plus-square-fill me-2 text-danger"></i>
                <span class="fw-bold">Nuevo Lote de Producto</span>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/lotes/guardar}" method="post" th:object="${lote}">
                    <div class="mb-3">
                        <label for="idProducto">Producto *</label>
                        <select id="idProducto" name="idProducto" class="form-select" required>
                            <option value="">-- Seleccione un producto --</option>
                            <option th:each="prod : ${productos}"
                                    th:value="${prod.idProducto}"
                                    th:text="${prod.nombre + ' (' + prod.categoria + ')'}">
                            </option>
                        </select>
                    </div>
                    <div class="row g-3">
                        <div class="col-12 col-sm-6 mb-3">
                            <label for="numeroLote">N° de Lote *</label>
                            <input type="text" id="numeroLote" name="numeroLote" class="form-control"
                                   th:value="${lote.numeroLote}"
                                   placeholder="Ej: LOTE-2024-001"
                                   required maxlength="50"/>
                        </div>
                        <div class="col-12 col-sm-6 mb-3">
                            <label for="cantidadInicial">Cantidad Inicial *</label>
                            <input type="number" id="cantidadInicial" name="cantidadInicial" class="form-control"
                                   th:value="${lote.cantidadInicial}"
                                   min="0" required/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="fechaVencimiento">Fecha de Vencimiento *</label>
                        <input type="date" id="fechaVencimiento" name="fechaVencimiento"
                               class="form-control" required/>
                        <div class="form-text small">La fecha debe ser estrictamente futura.</div>
                    </div>
                    <div class="d-grid d-sm-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4 rounded-pill">
                            <i class="bi bi-save me-1"></i>Registrar
                        </button>
                        <a th:href="@{/lotes}" class="btn btn-outline-secondary px-4 rounded-pill">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

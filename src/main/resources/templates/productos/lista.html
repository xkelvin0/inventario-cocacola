<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Productos - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link active"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Gestión de Productos</span>
    </div>
    <div class="page-content">
        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-box-fill me-2 text-danger"></i>Lista de Productos</span>
                <a th:href="@{/productos/nuevo}" class="btn btn-primary btn-sm rounded-pill px-3">
                    <i class="bi bi-plus-circle me-1"></i>Nuevo
                </a>
            </div>
            <!-- Filtros -->
            <div class="card-body border-bottom pb-3">
                <form method="get" th:action="@{/productos}" class="row g-2">
                    <div class="col-12 col-md-4">
                        <input type="text" name="nombre" class="form-control form-control-sm"
                                placeholder="Buscar por nombre..."
                                th:value="${filtroNombre}"/>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <input type="text" name="categoria" class="form-control form-control-sm"
                                placeholder="Categoría..."
                                th:value="${filtroCategoria}"/>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <select name="estado" class="form-select form-select-sm">
                            <option value="">-- Todos --</option>
                            <option value="true" th:selected="${filtroEstado == true}">Activos</option>
                            <option value="false" th:selected="${filtroEstado == false}">Inactivos</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-sm flex-grow-1">
                            <i class="bi bi-search"></i>
                        </button>
                        <a th:href="@{/productos}" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-clockwise"></i>
                        </a>
                    </div>
                </form>
            </div>
            <!-- Tabla -->
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Nombre</th>
                                <th class="d-none d-md-table-cell">Categoría</th>
                                <th>Precio</th>
                                <th class="d-none d-sm-table-cell">Estado</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="prod : ${productos}">
                                <td class="ps-4 text-muted" th:text="${prod.idProducto}"></td>
                                <td class="fw-semibold" th:text="${prod.nombre}"></td>
                                <td class="d-none d-md-table-cell">
                                    <span class="badge rounded-pill bg-light text-dark border" th:text="${prod.categoria}"></span>
                                </td>
                                <td th:text="${'S/ ' + prod.precioUnitario}"></td>
                                <td class="d-none d-sm-table-cell">
                                    <span th:if="${prod.estado}" class="badge bg-success-subtle text-success border">Activo</span>
                                    <span th:unless="${prod.estado}" class="badge bg-danger-subtle text-danger border">Inactivo</span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="d-flex justify-content-end gap-1">
                                        <a th:href="@{/productos/editar/{id}(id=${prod.idProducto})}"
                                           class="btn btn-sm btn-outline-primary shadow-sm">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        <form th:action="@{/productos/eliminar/{id}(id=${prod.idProducto})}"
                                              method="post" onsubmit="return confirm('¿Eliminar?')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger shadow-sm">
                                                <i class="bi bi-trash-fill"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(productos)}">
                                <td colspan="6" class="text-center text-muted py-5">
                                    <i class="bi bi-box d-block" style="font-size: 2rem;"></i>
                                    No hay productos.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

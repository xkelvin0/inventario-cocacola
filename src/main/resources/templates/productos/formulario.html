<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo + ' - Sistema de Inventario'}">Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 12px; max-width: 700px; margin: 0 auto; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(204,0,0,0.1); }
        label { font-weight: 500; font-size: 0.9rem; color: #374151; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link active"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold" th:text="${titulo}"></span>
    </div>
    <div class="page-content">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <i class="bi bi-pencil-square me-2 text-danger"></i>
                <span class="fw-bold" th:text="${titulo}"></span>
            </div>
            <div class="card-body p-4">
                <form th:action="${accion}" method="post" th:object="${producto}" novalidate>
                    <div class="mb-3">
                        <label for="nombre">Nombre del Producto *</label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                                th:value="${producto.nombre}"
                                placeholder="Ej: Coca-Cola 1.5L"
                                required maxlength="100"/>
                    </div>
                    <div class="mb-3">
                        <label for="categoria">Categoría *</label>
                        <input type="text" id="categoria" name="categoria" class="form-control"
                                th:value="${producto.categoria}"
                                placeholder="Ej: Gaseosas, Aguas, Jugos..."
                                required maxlength="50"/>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" name="descripcion" class="form-control"
                                  th:text="${producto.descripcion}"
                                  placeholder="Breve descripción del producto..."
                                  rows="2"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-12 col-sm-6 mb-3">
                            <label for="unidadMedida">Unidad *</label>
                            <select id="unidadMedida" name="unidadMedida" class="form-select" required>
                                <option value="Botella" th:selected="${producto.unidadMedida == 'Botella'}">Botella</option>
                                <option value="Lata" th:selected="${producto.unidadMedida == 'Lata'}">Lata</option>
                                <option value="Caja" th:selected="${producto.unidadMedida == 'Caja'}">Caja</option>
                                <option value="Paquete" th:selected="${producto.unidadMedida == 'Paquete'}">Paquete</option>
                                <option value="Tetrapack" th:selected="${producto.unidadMedida == 'Tetrapack'}">Tetrapack</option>
                                <option value="Unidad" th:selected="${producto.unidadMedida == 'Unidad'}">Unidad</option>
                            </select>
                        </div>
                        <div class="col-12 col-sm-6 mb-3">
                            <label for="precioUnitario">Precio (S/) *</label>
                            <input type="number" id="precioUnitario" name="precioUnitario" class="form-control"
                                   th:value="${producto.precioUnitario}"
                                   step="0.01" min="0" required/>
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-12 col-sm-6 mb-3">
                            <label for="stockMinimo">Stock Mínimo *</label>
                            <input type="number" id="stockMinimo" name="stockMinimo" class="form-control"
                                   th:value="${producto.stockMinimo}"
                                   min="0" required/>
                        </div>
                        <div class="col-12 col-sm-6 mb-3">
                            <label class="d-block mb-2">Estado</label>
                            <div class="form-check form-switch pt-1">
                                <input class="form-check-input" type="checkbox" id="estado" name="estado" 
                                       th:checked="${producto.estado == null ? true : producto.estado}">
                                <label class="form-check-label" for="estado">Activo</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-grid d-sm-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4 rounded-pill">
                            <i class="bi bi-save me-1"></i>
                            <span th:text="${titulo == 'Registrar Producto'} ? 'Registrar' : 'Actualizar'">Guardar</span>
                        </button>
                        <a th:href="@{/productos}" class="btn btn-outline-secondary px-4 rounded-pill">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                    </div>
                    <div class="mt-3">
                        <small class="text-muted">* Campos obligatorios</small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

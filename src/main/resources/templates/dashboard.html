<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill"></i><span>Coca-Cola Inv.</span></div>
    <div class="nav-section">Principal</div>
    <a th:href="@{/}" class="nav-link active"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <div class="nav-section">Gestión</div>
    <a th:href="@{/productos}" class="nav-link"><i class="bi bi-box-fill"></i> Productos</a>
    <a th:href="@{/lotes}" class="nav-link"><i class="bi bi-archive-fill"></i> Lotes</a>
    <a th:href="@{/movimientos}" class="nav-link"><i class="bi bi-arrow-left-right"></i> Movimientos</a>
    <div class="nav-section">Consultas</div>
    <a th:href="@{/inventario}" class="nav-link"><i class="bi bi-clipboard-data-fill"></i> Inventario</a>
    <a th:href="@{/inventario/reporte}" class="nav-link"><i class="bi bi-bar-chart-fill"></i> Reporte</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="sidebar-toggler" id="sidebar-toggler"><i class="bi bi-list"></i></div>
        <span class="text-muted fw-semibold">Dashboard</span>
    </div>
    <div class="page-content">
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #cc0000, #ff4d4d);">
                    <i class="bi bi-currency-dollar icon"></i>
                    <h3 th:text="${'S/ ' + #numbers.formatDecimal(valorizacionTotal != null ? valorizacionTotal : 0, 1, 'COMMA', 2, 'POINT')}">S/ 0.00</h3>
                    <p>Valorización</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #800000, #b30000);">
                    <i class="bi bi-stack icon"></i>
                    <h3 th:text="${totalStock}">0</h3>
                    <p>Stock Total</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                    <i class="bi bi-exclamation-octagon icon"></i>
                    <h3 th:text="${lotesCriticos}">0</h3>
                    <p>Por Vencer</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #dc2626, #ef4444);">
                    <i class="bi bi-exclamation-triangle-fill icon"></i>
                    <h3 th:text="${alertas}">0</h3>
                    <p>Stock Bajo</p>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-xl-4">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-graph-up-arrow me-2 text-success"></i>Top Productos</div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush">
                            <li th:each="top : ${topMovimientos}" class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span th:text="${top.nombre}" class="fw-semibold text-truncate"></span>
                                <span class="badge bg-danger rounded-pill" th:text="${top.cantidad} + ' mov.'"></span>
                            </li>
                            <li th:if="${#lists.isEmpty(topMovimientos)}" class="list-group-item text-center text-muted py-4">Sin movimientos.</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="col-12 col-xl-8">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-clipboard-data me-2 text-primary"></i>Resumen Stock</span>
                        <a th:href="@{/inventario}" class="btn btn-sm btn-outline-danger">Ver todo</a>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead>
                                    <tr>
                                        <th class="ps-3">Producto</th>
                                        <th>Stock</th>
                                        <th class="d-none d-sm-table-cell">Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="inv : ${inventarios}">
                                        <td class="ps-3 fw-semibold" th:text="${inv.nombreProducto}"></td>
                                        <td><strong th:text="${inv.stockActual}"></strong></td>
                                        <td class="d-none d-sm-table-cell">
                                            <span th:if="${inv.stockActual <= inv.stockMinimo}" class="badge bg-danger">BAJO</span>
                                            <span th:unless="${inv.stockActual <= inv.stockMinimo}" class="badge bg-success">OK</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-3">
            <div class="col-6 col-md-3">
                <a th:href="@{/productos/nuevo}" class="btn btn-white border w-100 py-3 shadow-sm h-100 d-flex flex-column align-items-center">
                    <i class="bi bi-plus-circle mb-1 text-danger"></i><span class="small fw-bold">Producto</span>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/lotes/nuevo}" class="btn btn-white border w-100 py-3 shadow-sm h-100 d-flex flex-column align-items-center">
                    <i class="bi bi-archive mb-1 text-success"></i><span class="small fw-bold">Lote</span>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/movimientos/nuevo}" class="btn btn-white border w-100 py-3 shadow-sm h-100 d-flex flex-column align-items-center">
                    <i class="bi bi-arrow-left-right mb-1 text-warning"></i><span class="small fw-bold">Mov.</span>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/inventario/reporte}" class="btn btn-white border w-100 py-3 shadow-sm h-100 d-flex flex-column align-items-center">
                    <i class="bi bi-bar-chart mb-1 text-info"></i><span class="small fw-bold">Reporte</span>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
